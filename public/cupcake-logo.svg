  <rect x="78" y="50" width="4" height="2" rx="1" fill="#38bdf8" transform="rotate(15 80 51)" />
  <rect x="64" y="56" width="4" height="2" rx="1" fill="#fbbf24" transform="rotate(8 66 57)" />
